<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>标签颜色 — 64色 HSL 预览</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#FAFAFA;padding:40px;color:#1D1D1F}
h2{font-size:1.1rem;font-weight:600;margin:32px 0 16px}
h2:first-child{margin-top:0}
.note{font-size:.75rem;color:#86868B;margin-bottom:20px}
.swatches{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px}
.swatch{width:52px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;border:0.5px solid transparent}
.card-chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.chip{font-size:13px;border-radius:10px;padding:2px 7px;white-space:nowrap;display:inline-block;margin:1px;border:0.5px solid transparent}
.card{border:0.5px solid #E5E5EA;border-radius:12px;padding:14px;max-width:560px;margin-bottom:10px;background:#fff}
.card-name{font-size:13px;font-weight:600;margin-bottom:4px}
.card-meta{font-size:11px;color:#86868B;margin-bottom:6px}
.cmp-table{border-collapse:collapse;font-size:.8125rem;width:100%;max-width:700px}
.cmp-table thead th{background:#22c55e;color:#fff;padding:10px 12px;font-weight:500;font-size:12px;text-align:center}
.cmp-table thead th:first-child{border-radius:6px 0 0 0}
.cmp-table thead th:last-child{border-radius:0 6px 0 0}
.cmp-table tbody td{padding:10px 12px;text-align:center;border-bottom:0.5px solid #E5E5EA}
.cmp-table tbody td:first-child{text-align:left;font-weight:600;font-size:11px}
.cmp-cell{padding:8px;text-align:center}
.dupe-test{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.dup-tag{display:flex;flex-direction:column;align-items:center;gap:4px}
.dup-tag span{font-size:9px;color:#86868B}
</style>
</head>
<body>

<h2>🎨 64色 HSL 色盘（完整色相环）</h2>
<p class="note">每 5.6° 一个色相 × 360° = 64 色均匀覆盖。同一标签名称 → 同一颜色（hash 映射）。</p>
<div class="swatches" id="swatches"></div>

<h2>🔄 同标签跨位置一致性验证</h2>
<div class="card">
  <p class="note" style="margin-bottom:8px">标签「需求分析」在卡片、对比、详情三处是否同一颜色？</p>
  <div class="dupe-test" id="dupe-test"></div>
</div>

<h2>📇 卡片标签</h2>
<div class="card" id="card-demo"></div>

<h2>📊 对比页标签</h2>
<table class="cmp-table" style="margin-top:12px">
<thead><tr><th>属性</th><th>胡芳</th><th>朱娜</th><th>郭超</th></tr></thead>
<tbody><tr><td>技能标签</td><td class="cmp-cell" id="cmp-1"></td><td class="cmp-cell" id="cmp-2"></td><td class="cmp-cell" id="cmp-3"></td></tr></tbody>
</table>

<h2>📋 详情页标签</h2>
<div class="card"><div style="font-size:.75rem;color:#86868B;text-transform:uppercase;margin-bottom:8px">技能标签</div><div class="card-chips" id="detail-skills"></div></div>
<div class="card" style="margin-top:10px"><div style="font-size:.75rem;color:#86868B;text-transform:uppercase;margin-bottom:8px">人才标签</div><div class="card-chips" id="detail-tags"></div></div>

<script>
// === Exact same hash function as talent-widget.js ===
function tagColor(tag){
  var h=0;for(var i=0;i<tag.length;i++){h=((h<<5)-h)+tag.charCodeAt(i);h|=0;}
  var hue=Math.abs(h)%360;
  var s2=Math.abs((h*31+7)%26)+50;
  var bg='hsl('+hue+','+s2+'%,85%)';
  var t='hsl('+hue+','+(s2+10)+'%,24%)';
  var b='hsl('+hue+','+s2+'%,60%)';
  return {bg:bg,t:t,b:b};
}
function chipHTML(x){
  var c=tagColor(x);
  return '<span class="chip" style="background:'+c.bg+';color:'+c.t+';border-color:'+c.b+'">'+x+'</span>';
}

// 1. Full 64 swatches — show the whole color wheel
var swatches=document.getElementById('swatches');
for(var i=0;i<64;i++){
  var hue=Math.round(i*360/64);
  var bg='hsl('+hue+',60%,85%)';
  var t='hsl('+hue+',70%,24%)';
  var b='hsl('+hue+',60%,60%)';
  swatches.innerHTML+='<div class="swatch" style="background:'+bg+';color:'+t+';border-color:'+b+'">'+hue+'°</div>';
}

// 2. Consistency test — same tag text = same color everywhere
var testTags=['需求分析','敏捷管理','Python','数据分析'];
var dupe=document.getElementById('dupe-test');
testTags.forEach(function(tag){
  dupe.innerHTML+='<div class="dup-tag">'+chipHTML(tag)+'<span>卡片</span></div> '+
    '<div class="dup-tag">'+chipHTML(tag)+'<span>对比</span></div> '+
    '<div class="dup-tag">'+chipHTML(tag)+'<span>详情</span></div>';
});

// 3. Card with 12 diverse tags
var cardTags=['需求分析','原型设计','敏捷管理','数据分析','用户研究','跨部门协作','项目管理','Python','SQL','Figma','PRD撰写','竞品分析'];
document.getElementById('card-demo').innerHTML='<div class="card-name">胡芳 · S · 92</div>'+
  '<div class="card-meta">研发部 · 产品经理 · P6 · 本科</div>'+
  '<div class="card-chips">'+cardTags.map(chipHTML).join('')+'</div>';

// 4. Compare — shared tags appear in same color across people
var cmpTags1=['需求分析','敏捷管理','用户研究','PRD撰写','Figma'];
var cmpTags2=['市场调研','竞品分析','需求分析','产品规划','数据分析'];
var cmpTags3=['Python','SQL','数据分析','敏捷管理','Tableau'];
document.getElementById('cmp-1').innerHTML='<div class="card-chips" style="justify-content:center">'+cmpTags1.map(chipHTML).join('')+'</div>';
document.getElementById('cmp-2').innerHTML='<div class="card-chips" style="justify-content:center">'+cmpTags2.map(chipHTML).join('')+'</div>';
document.getElementById('cmp-3').innerHTML='<div class="card-chips" style="justify-content:center">'+cmpTags3.map(chipHTML).join('')+'</div>';

// 5. Detail tags
document.getElementById('detail-skills').innerHTML=cardTags.map(chipHTML).join('');
document.getElementById('detail-tags').innerHTML=['数字化转型','高潜人才','导师','国际化','GPS人员','NPI经验丰富','技术专家'].map(chipHTML).join('');
</script>
</body>
</html>
